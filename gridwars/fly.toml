app = "gridwars-run"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  DJANGO_SETTINGS_MODULE = "server.conf.settings"
  PYTHONUNBUFFERED = "1"

[[mounts]]
  source = "gridwars_data"
  destination = "/data"

[[services]]
  protocol = "tcp"
  internal_port = 4000

  [[services.ports]]
    port = 4000

[[services]]
  protocol = "tcp"
  internal_port = 4001

  [[services.ports]]
    port = 4001

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "30s"
    port = 4000

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
