name: PR Agent

# AI pull-request review (describe, review, improve, ask). The job is gated on
# an OPENAI_KEY secret, so it stays dormant and free until you opt in by adding
# the key. OpenAI bills per PR. Once enabled, comment /review, /describe, or
# /improve on a PR to trigger on demand.
on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr_agent:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    env:
      OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
    steps:
      - name: Harden runner
        if: ${{ env.OPENAI_KEY != '' }}
        uses: step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit
      - name: PR Agent
        if: ${{ env.OPENAI_KEY != '' }}
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: The-PR-Agent/pr-agent@v0.36.0
