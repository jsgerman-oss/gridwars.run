name: Zizmor

# Security linter for the GitHub Actions workflows themselves: template
# injection, over-broad permissions, unpinned actions, and similar. Credential
# free and works on any visibility. Report mode keeps the build green; remove
# continue-on-error to enforce.
on:
  push:
    branches: [main, master]
    paths: ['.github/workflows/**']
  pull_request:
    paths: ['.github/workflows/**']
  schedule:
    - cron: '35 4 * * 1'  # weekly, Monday 04:35 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zizmor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: Workflow lint
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run zizmor (report mode)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: pipx run zizmor .
