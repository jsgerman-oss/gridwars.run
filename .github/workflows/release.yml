name: Release

# Creates a GitHub Release with auto-generated notes when a v* tag is pushed.
# Dormant until you push a tag like v1.2.3. No external credentials needed.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          generate_release_notes: true
