name: cf-pages-deploy

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/cf-pages-deploy.yml'

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 4bf8ccaf39f18a8a46b21a317e2d3a1b
          command: pages deploy landing --project-name=gridwars-run --branch=main
