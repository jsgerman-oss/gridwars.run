name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache .venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('pyproject.toml', 'vendor/evennia/pyproject.toml', '.gitmodules') }}
          restore-keys: |
            venv-${{ runner.os }}-py3.12-

      - name: Install (creates .venv on cache miss)
        run: make install

      - name: Migrate
        run: make migrate

      - name: Test
        run: make test
